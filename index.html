<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visage</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">V</div>
          <div>
            <h1>Visage</h1>
            <p id="caseLabel">New case</p>
          </div>
        </div>

        <div class="stepper" aria-label="Case progress">
          <span class="step active" data-step-indicator="profile">Profile</span>
          <span class="step" data-step-indicator="interview">Interview</span>
          <span class="step" data-step-indicator="iterations">Iterations</span>
        </div>
      </header>

      <section class="screen active" id="profileScreen" aria-labelledby="profileTitle">
        <div class="screen-header">
          <p class="eyebrow">New case</p>
          <h2 id="profileTitle">Build the initial suspect profile</h2>
        </div>

        <form class="profile-form" id="profileForm">
          <label>
            Case ID
            <input name="caseId" value="24-1187" autocomplete="off" />
          </label>

          <label>
            Gender
            <select name="gender">
              <option selected>unknown or not specified</option>
              <option>male</option>
              <option>female</option>
              <option>nonbinary or gender nonconforming</option>
            </select>
          </label>

          <label>
            Race / ethnicity
            <select name="raceEthnicity">
              <option selected>unknown or not specified</option>
              <option>Asian</option>
              <option>Black or African American</option>
              <option>Hispanic or Latino</option>
              <option>Middle Eastern or North African</option>
              <option>Native American or Alaska Native</option>
              <option>Pacific Islander</option>
              <option>White</option>
              <option>multiracial or mixed ethnicity</option>
              <option>other witness-described appearance</option>
            </select>
          </label>

          <label>
            Age range
            <select name="age">
              <option>unknown adult</option>
              <option>late teens</option>
              <option>20s</option>
              <option selected>30s</option>
              <option>40s</option>
              <option>50s</option>
              <option>60s or older</option>
            </select>
          </label>

          <label>
            Eye color
            <select name="eyeColor">
              <option selected>unknown eye color</option>
              <option>brown eyes</option>
              <option>blue eyes</option>
              <option>green eyes</option>
              <option>hazel eyes</option>
              <option>gray eyes</option>
              <option>dark eyes</option>
              <option>light eyes</option>
            </select>
          </label>

          <label>
            Hair color
            <select name="hairColor">
              <option selected>unknown hair color</option>
              <option>black hair</option>
              <option>brown hair</option>
              <option>blond hair</option>
              <option>red hair</option>
              <option>gray hair</option>
              <option>white hair</option>
              <option>dyed or unusual hair color</option>
            </select>
          </label>

          <label>
            Composite style
            <select name="style">
              <option selected>forensic pencil composite</option>
              <option>neutral grayscale portrait</option>
              <option>police sketch linework</option>
            </select>
          </label>

          <label>
            Iterations
            <select name="iterations">
              <option>2</option>
              <option selected>3</option>
              <option>4</option>
            </select>
          </label>

          <label>
            Voice model
            <select name="voiceModel">
              <option selected>gpt-realtime</option>
              <option>gpt-realtime-mini</option>
              <option>gpt-realtime-2</option>
            </select>
          </label>

          <label>
            Image model
            <select name="imageModel">
              <option>gpt-image-1.5</option>
              <option selected>gpt-image-1</option>
              <option>gpt-image-1-mini</option>
            </select>
          </label>
        </form>

        <div class="actions">
          <button class="primary-action" id="startCaseButton" type="button">Start interview</button>
        </div>
      </section>

      <section class="screen" id="interviewScreen" aria-labelledby="interviewTitle">
        <div class="screen-header split">
          <div>
            <p class="eyebrow">Witness interview</p>
            <h2 id="interviewTitle">Capture descriptions for one suspect</h2>
          </div>
          <span class="status-pill" id="sessionStatus">Ready</span>
        </div>

        <div class="interview-layout">
          <div class="voice-card" id="voiceCard">
            <div class="voice-header">
              <button class="record-button" id="recordButton" type="button">
                <span class="record-icon" aria-hidden="true"></span>
                <span id="recordLabel">Start interview</span>
              </button>
              <button class="finish-button" id="finishInterviewButton" type="button">Finish interview</button>
            </div>

            <div class="waveform" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>

            <div class="transcript" id="transcript" aria-label="Interview transcript"></div>
          </div>

          <aside class="summary-card">
            <h3>Suspect profile</h3>
            <dl id="profileSummary"></dl>
          </aside>
        </div>
      </section>

      <section class="screen" id="iterationsScreen" aria-labelledby="iterationsTitle">
        <div class="screen-header split">
          <div>
            <p class="eyebrow">Image generation</p>
            <h2 id="iterationsTitle">Suspect iterations</h2>
          </div>
          <div class="result-actions">
            <button class="secondary-action" id="backToInterviewButton" type="button">Back to interview</button>
            <button class="primary-action" id="regenerateButton" type="button">Regenerate</button>
          </div>
        </div>

        <div class="iterations-grid" id="iterationsGrid" aria-live="polite"></div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
